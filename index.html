<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlowValet — Check In</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<!-- QR Code generator (client-side, no external API needed) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root {
  --black: #0a0a0a;
  --white: #f5f5f0;
  --gold: #c9a84c;
  --gold-light: #e8c97a;
  --surface: #141414;
  --surface2: #1e1e1e;
  --border: rgba(201,168,76,0.2);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--black);
  color: var(--white);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(201,168,76,0.12) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}
.page { position:relative; z-index:1; flex:1; display:flex; flex-direction:column; }

header {
  display:flex; justify-content:space-between; align-items:center;
  padding:20px 28px; border-bottom:1px solid var(--border);
}
.logo { font-family:'Syne',sans-serif; font-weight:800; font-size:22px; color:var(--white); }
.logo span { color:var(--gold); }
.nav-btn {
  padding:8px 18px; border-radius:8px; font-size:13px; font-weight:600;
  cursor:pointer; text-decoration:none; transition:all 0.2s;
  font-family:'DM Sans',sans-serif; background:var(--gold); color:var(--black); border:none;
}
.nav-btn:hover { background:var(--gold-light); }

main { flex:1; display:flex; align-items:center; justify-content:center; padding:32px 20px; }

.wrap { width:100%; max-width:460px; }
.title { font-family:'Syne',sans-serif; font-size:30px; font-weight:800; margin-bottom:6px; }
.title span { color:var(--gold); }
.sub { color:rgba(245,245,240,0.45); font-size:14px; margin-bottom:28px; }

.card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:16px; padding:28px; margin-bottom:16px;
}
.field { margin-bottom:20px; }
.field label {
  display:block; font-size:11px; font-weight:600; letter-spacing:1.2px;
  text-transform:uppercase; color:var(--gold); margin-bottom:8px;
}
.field input {
  width:100%; background:var(--surface2); border:1px solid rgba(255,255,255,0.08);
  border-radius:10px; padding:14px 16px; font-size:18px; font-weight:600;
  font-family:'Syne',sans-serif; color:var(--white); letter-spacing:2px;
  text-transform:uppercase; outline:none; transition:border-color 0.2s;
}
.field input::placeholder { color:rgba(255,255,255,0.18); font-weight:400; letter-spacing:1px; }
.field input:focus { border-color:var(--gold); }
.spot-input { font-size:28px !important; text-align:center; letter-spacing:4px !important; }

.btn {
  width:100%; padding:16px; background:var(--gold); color:var(--black);
  border:none; border-radius:10px; font-family:'Syne',sans-serif;
  font-size:16px; font-weight:700; cursor:pointer; transition:all 0.2s;
}
.btn:hover { background:var(--gold-light); transform:translateY(-1px); }
.btn:active { transform:translateY(0); }

/* QR Result */
.qr-box { display:none; text-align:center; }
.qr-box.show { display:block; animation:fadeUp 0.4s ease; }
@keyframes fadeUp {
  from { opacity:0; transform:translateY(16px); }
  to { opacity:1; transform:translateY(0); }
}
.qr-plate {
  font-family:'Syne',sans-serif; font-size:28px; font-weight:800;
  letter-spacing:4px; color:var(--gold); margin-bottom:4px;
}
.qr-meta { font-size:13px; color:rgba(255,255,255,0.45); margin-bottom:22px; }
.qr-meta strong { color:var(--white); }

.qr-img-wrap {
  background:white; border-radius:14px; padding:16px;
  display:inline-block; margin-bottom:22px;
}
/* qrcode.js renders a canvas or img inside this div */
#qrCanvas { display:block; }
#qrCanvas canvas, #qrCanvas img { display:block; }

.qr-actions { display:flex; gap:10px; }
.qr-action-btn {
  flex:1; padding:13px; border-radius:10px; font-family:'DM Sans',sans-serif;
  font-size:14px; font-weight:600; cursor:pointer; transition:all 0.2s; border:none;
}
.btn-print { background:var(--surface2); color:var(--white); border:1px solid var(--border); }
.btn-print:hover { border-color:var(--gold); }
.btn-new { background:var(--gold); color:var(--black); }
.btn-new:hover { background:var(--gold-light); }

/* Toast */
.toast {
  position:fixed; bottom:30px; left:50%; transform:translateX(-50%) translateY(80px);
  background:var(--surface2); border:1px solid var(--border); color:var(--white);
  padding:12px 24px; border-radius:100px; font-size:14px; font-weight:500;
  transition:transform 0.3s ease; z-index:999; white-space:nowrap;
}
.toast.show { transform:translateX(-50%) translateY(0); }

/* Footer copyright */
footer {
  text-align:center; padding:14px 20px;
  border-top:1px solid rgba(201,168,76,0.1);
  font-size:11px; color:rgba(245,245,240,0.25);
  letter-spacing:0.5px; font-family:'DM Sans',sans-serif;
}
footer span { color:rgba(201,168,76,0.5); }

/* ── PRINT STYLES ── */
@media print {
  @page { size: 80mm 120mm; margin: 0; }

  body {
    background: #fff !important;
    color: #000 !important;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
    margin: 0; padding: 0;
  }
  body::before { display:none; }

  /* Hide everything except the print receipt */
  header, .form-card, .qr-actions, footer,
  .card:not(.qr-box), .sub, .title { display:none !important; }

  .page { display:block; }
  main { display:block; padding:0; }
  .wrap { max-width:100%; }

  .qr-box {
    display:block !important;
    background:#fff;
    border:none !important;
    border-radius:0 !important;
    padding:0 !important;
    margin:0 !important;
  }

  /* Print receipt layout */
  .print-receipt {
    display:flex !important;
    flex-direction:column;
    align-items:center;
    padding:6mm 5mm 5mm;
    width:100%;
    font-family:'DM Sans', Arial, sans-serif;
  }
  .print-receipt .pr-brand {
    font-size:15pt;
    font-weight:900;
    letter-spacing:1px;
    color:#000;
    margin-bottom:1mm;
  }
  .print-receipt .pr-brand em {
    color:#b8860b;
    font-style:normal;
  }
  .print-receipt .pr-divider {
    width:100%;
    border:none;
    border-top:1px dashed #ccc;
    margin:3mm 0;
  }
  .print-receipt .pr-plate {
    font-size:26pt;
    font-weight:900;
    letter-spacing:5px;
    color:#000;
    margin-bottom:1mm;
  }
  .print-receipt .pr-spot-row {
    display:flex;
    gap:6mm;
    margin-bottom:3mm;
  }
  .print-receipt .pr-field {
    text-align:center;
  }
  .print-receipt .pr-field-label {
    font-size:6pt;
    text-transform:uppercase;
    letter-spacing:1px;
    color:#888;
    margin-bottom:0.5mm;
  }
  .print-receipt .pr-field-val {
    font-size:14pt;
    font-weight:800;
    color:#000;
  }
  .print-receipt .pr-qr {
    margin:3mm 0 2mm;
    background:#fff;
    padding:3mm;
    border:1px solid #ddd;
    border-radius:3mm;
  }
  .print-receipt .pr-qr canvas,
  .print-receipt .pr-qr img {
    display:block;
    width:45mm !important;
    height:45mm !important;
  }
  .print-receipt .pr-scan-note {
    font-size:7pt;
    color:#555;
    text-align:center;
    margin-bottom:3mm;
  }
  .print-receipt .pr-copyright {
    font-size:6pt;
    color:#aaa;
    text-align:center;
    margin-top:2mm;
  }

  /* Hide screen-only QR wrapper and show print receipt */
  .qr-img-wrap { display:none !important; }
  .qr-plate, .qr-meta { display:none !important; }
  .print-receipt { display:flex !important; }
}

/* Hide print receipt on screen */
.print-receipt { display:none; }
</style>
</head>
<body>
<div class="page">
  <header>
    <div class="logo">Flow<span>Valet</span></div>
    <a href="dashboard.html" class="nav-btn">📊 Dashboard</a>
  </header>
  <main>
    <div class="wrap">
      <div class="title">Vehicle <span>Check-In</span></div>
      <div class="sub">Enter plate and spot to generate the customer QR ticket.</div>

      <div class="card" id="formCard">
        <div class="field">
          <label>License Plate</label>
          <input id="plateInput" type="text" placeholder="ABC 1234" maxlength="12" autocomplete="off" oninput="this.value=this.value.toUpperCase()">
        </div>
        <div class="field">
          <label>Parking Spot</label>
          <input id="spotInput" type="text" class="spot-input" placeholder="A4" maxlength="6" autocomplete="off" oninput="this.value=this.value.toUpperCase()">
        </div>
        <button class="btn" onclick="createTicket()">⚡ Generate QR Ticket</button>
      </div>

      <div class="card qr-box" id="qrResult">
        <!-- Screen view -->
        <div class="qr-plate" id="rPlate"></div>
        <div class="qr-meta">Spot <strong id="rSpot"></strong> &nbsp;·&nbsp; <span id="rTime"></span></div>
        <div class="qr-img-wrap">
          <div id="qrCanvas"></div>
        </div>
        <div class="qr-actions">
          <button class="qr-action-btn btn-print" onclick="window.print()">🖨️ Print Ticket</button>
          <button class="qr-action-btn btn-new" onclick="newTicket()">+ New Ticket</button>
        </div>

        <!-- Print-only receipt (hidden on screen, shown on print) -->
        <div class="print-receipt" id="printReceipt">
          <div class="pr-brand">Flow<em>Valet</em></div>
          <div style="font-size:7pt;color:#888;margin-bottom:1mm;">Valet Parking Ticket</div>
          <hr class="pr-divider">
          <div class="pr-plate" id="prPlate"></div>
          <div class="pr-spot-row">
            <div class="pr-field">
              <div class="pr-field-label">Spot</div>
              <div class="pr-field-val" id="prSpot"></div>
            </div>
            <div class="pr-field">
              <div class="pr-field-label">Time</div>
              <div class="pr-field-val" id="prTime" style="font-size:10pt;"></div>
            </div>
            <div class="pr-field">
              <div class="pr-field-label">Date</div>
              <div class="pr-field-val" id="prDate" style="font-size:10pt;"></div>
            </div>
          </div>
          <hr class="pr-divider">
          <div class="pr-qr">
            <div id="qrPrint"></div>
          </div>
          <div class="pr-scan-note">Scan to notify valet when ready to leave</div>
          <hr class="pr-divider">
          <div class="pr-copyright">© M.A.J · All Rights Reserved · FlowValet</div>
        </div>
      </div>
    </div>
  </main>
</div>
<div class="toast" id="toast"></div>

<footer>
  Flow<span>Valet</span> &nbsp;·&nbsp; © Mohammad Al-Jammal &nbsp;·&nbsp; All Rights Reserved
</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyC0IXfYNIbEjbLiPiY8C2C_JPAd5baTLMo",
  authDomain: "flowvalet-efd95.firebaseapp.com",
  databaseURL: "https://flowvalet-efd95-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "flowvalet-efd95",
  storageBucket: "flowvalet-efd95.firebasestorage.app",
  messagingSenderId: "394962828421",
  appId: "1:394962828421:web:7bab162c88f3da9ee13dec"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
window.__db = db;
window.__ref = ref;
window.__set = set;
window.__fbReady = true;
</script>

<script>
function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2500);
}

function genId() {
  return Math.random().toString(36).substr(2,8).toUpperCase();
}

var currentQR = null;
var currentQRPrint = null;

function createTicket() {
  var plate = document.getElementById('plateInput').value.trim().toUpperCase();
  var spot  = document.getElementById('spotInput').value.trim().toUpperCase();
  if (!plate) { toast('Please enter a plate number'); return; }
  if (!spot)  { toast('Please enter a parking spot'); return; }

  var id = genId();
  var now = new Date();
  var timeStr = now.toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit'});
  var dateStr = now.toLocaleDateString('en-GB', {day:'numeric', month:'short', year:'numeric'});
  var dateShort = now.toLocaleDateString('en-GB', {day:'numeric', month:'short'});

  var ticketData = {
    plate: plate,
    spot: spot,
    checkinTime: now.toISOString(),
    status: 'parked'
  };

  // Save to Firebase
  if (window.__fbReady) {
    window.__set(window.__ref(window.__db, 'tickets/' + id), ticketData)
      .then(function(){ toast('✅ Ticket created'); })
      .catch(function(){ toast('⚠️ Firebase error — check console'); });
  }

  // Build ticket URL
  var base = window.location.href.replace(/index\.html.*/, '').replace(/\/$/, '');
  var ticketUrl = base + '/ticket.html?id=' + id;

  // Update screen display
  document.getElementById('rPlate').textContent = plate;
  document.getElementById('rSpot').textContent = spot;
  document.getElementById('rTime').textContent = timeStr + ' · ' + dateStr;

  // Update print receipt fields
  document.getElementById('prPlate').textContent = plate;
  document.getElementById('prSpot').textContent = spot;
  document.getElementById('prTime').textContent = timeStr;
  document.getElementById('prDate').textContent = dateShort;

  // Generate QR (screen) — clear previous
  var qrContainer = document.getElementById('qrCanvas');
  qrContainer.innerHTML = '';
  currentQR = new QRCode(qrContainer, {
    text: ticketUrl,
    width: 200,
    height: 200,
    colorDark: '#000000',
    colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.M
  });

  // Generate QR (print) — smaller for receipt
  var qrPrintContainer = document.getElementById('qrPrint');
  qrPrintContainer.innerHTML = '';
  currentQRPrint = new QRCode(qrPrintContainer, {
    text: ticketUrl,
    width: 170,
    height: 170,
    colorDark: '#000000',
    colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.M
  });

  document.getElementById('formCard').style.display = 'none';
  document.getElementById('qrResult').classList.add('show');
}

function newTicket() {
  document.getElementById('plateInput').value = '';
  document.getElementById('spotInput').value = '';
  document.getElementById('qrResult').classList.remove('show');
  document.getElementById('formCard').style.display = 'block';
  // Clear QR containers
  document.getElementById('qrCanvas').innerHTML = '';
  document.getElementById('qrPrint').innerHTML = '';
}

document.addEventListener('keydown', function(e){ if(e.key==='Enter') createTicket(); });
</script>
</body>
</html>
